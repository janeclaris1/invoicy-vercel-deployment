scripts:
  - type: beforeRequest
    code: >-
      pm.sendRequest({
          url: 'http://localhost:8000/api/auth/login',
          method: 'POST',
          header: {
              'Content-Type': 'application/json'
          },
          body: {
              mode: 'raw',
              raw: JSON.stringify({ email: 'ron@test.com', password: 'password' })
          }
      }, function (err, res) {
          if (err) {
              console.error('Login request failed:', err);
              return;
          }

          console.log('Login response status:', res.code);

          if (res.code === 200) {
              const responseData = res.json();
              console.log('Login response body:', JSON.stringify(responseData));

              const token = responseData.token
                  || (responseData.data && responseData.data.token)
                  || responseData.access_token
                  || responseData.accessToken;

              if (token) {
                  pm.environment.set('authToken', token);
                  console.log('authToken set successfully.');
              } else {
                  console.warn('Login succeeded but no token found in response. Full response:', JSON.stringify(responseData));
              }
          } else {
              console.error('Login failed with status:', res.code, 'Body:', res.text());
          }
      });
    language: text/javascript
